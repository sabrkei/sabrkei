<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 570 80" width="570" height="80">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0f"/>
      <stop offset="100%" style="stop-color:#111113"/>
    </linearGradient>
    <style>
      .btn-bg { fill: #1e1e22; stroke: #2e2e36; stroke-width: 0.8; }
      .btn-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; font-weight: 500; fill: #e8e8f0; dominant-baseline: middle; }
      .icon { fill: #e8e8f0; }
      .icon-stroke { fill: none; stroke: #e8e8f0; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      a:hover .btn-bg { fill: #26262c; }
      .btn-li:hover .btn-bg   { stroke: #0A66C2; filter: drop-shadow(0 0 8px #0A66C244); }
      .btn-gh:hover .btn-bg   { stroke: #aaaaaa; filter: drop-shadow(0 0 8px #aaaaaa33); }
      .btn-npm:hover .btn-bg  { stroke: #CB3837; filter: drop-shadow(0 0 8px #CB383744); }
      .btn-web:hover .btn-bg  { stroke: #4285F4; filter: drop-shadow(0 0 8px #4285F444); }
      .btn-mail:hover .btn-bg { stroke: #EA4335; filter: drop-shadow(0 0 8px #EA433544); }
    </style>
  </defs>

  <rect width="570" height="80" fill="url(#bg)" rx="14"/>

  <!-- Each button is 100px wide with 10px gaps. Centers: 60, 170, 280, 390, 505 -->
  <!-- Icon+text group is centered via a <g> translate to button center, then icon at -half_content_w, text at icon_w+gap-half_content_w -->

  <!-- LinkedIn: center=60, content=18+6+52=76px, half=38 -->
  <a href="https://www.linkedin.com/in/scottabrahamkeinstrom/" class="btn-li">
    <rect class="btn-bg" x="10" y="16" width="100" height="48" rx="8"/>
    <g transform="translate(60,40)">
      <svg x="-38" y="-9" width="18" height="18" viewBox="0 0 24 24">
        <path class="icon" d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
      </svg>
      <text class="btn-text" x="-15" y="0">LinkedIn</text>
    </g>
  </a>

