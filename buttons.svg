    <rect class="btn-bg" x="120" y="16" width="100" height="48" rx="8"/>
    <g transform="translate(170,40)">
      <svg x="-34" y="-9" width="18" height="18" viewBox="0 0 24 24">
        <path class="icon" d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
      </svg>
      <text class="btn-text" x="-11" y="0">GitHub</text>
    </g>
  </a>

  <!-- npm: center=280, content=18+6+24=48px, half=24 -->
  <a href="https://www.npmjs.com/~sabrkei" class="btn-npm">
    <rect class="btn-bg" x="230" y="16" width="100" height="48" rx="8"/>
    <g transform="translate(280,40)">
      <svg x="-24" y="-9" width="18" height="18" viewBox="0 0 24 24">
        <path class="icon" d="M1.763 0C.786 0 0 .786 0 1.763v20.474C0 23.214.786 24 1.763 24h20.474c.977 0 1.763-.786 1.763-1.763V1.763C24 .786 23.214 0 22.237 0zM5.13 5.323l13.837.019-.009 13.836h-3.464l.01-10.382h-3.456L12.04 19.17H5.113z"/>
      </svg>
      <text class="btn-text" x="-1" y="0">npm</text>
    </g>
  </a>

  <!-- Portfolio: center=390, content=18+6+52=76px, half=38 -->
  <a href="https://gbg-web.com" class="btn-web">
    <rect class="btn-bg" x="340" y="16" width="100" height="48" rx="8"/>
    <g transform="translate(390,40)">
      <svg x="-38" y="-9" width="18" height="18" viewBox="0 0 24 24">
        <circle class="icon-stroke" cx="12" cy="12" r="10"/>
        <line class="icon-stroke" x1="2" y1="12" x2="22" y2="12"/>
        <path class="icon-stroke" d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
      </svg>
      <text class="btn-text" x="-15" y="0">Portfolio</text>
    </g>
  </a>

  <!-- Email: center=505, content=18+6+32=56px, half=28. btn x=455..565 -->
  <a href="mailto:scottabraham87@gmail.com" class="btn-mail">
    <rect class="btn-bg" x="455" y="16" width="110" height="48" rx="8"/>
    <g transform="translate(510,40)">
      <svg x="-28" y="-9" width="18" height="18" viewBox="0 0 24 24">
        <path class="icon-stroke" d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline class="icon-stroke" points="22,6 12,13 2,6"/>
      </svg>
      <text class="btn-text" x="-5" y="0">Email</text>
    </g>
  </a>

</svg>
